<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <!-- এটি সব স্ক্রিনে সাইজ ঠিক রাখার জন্য -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LFM Shop - Home</title>
    <style>
        /* একদম বেসিক CSS যা বাটন ফোনেও ১০০% কাজ করবে */
        body { font-family: sans-serif; margin: 0; padding: 0; background-color: #f1f2f6; }
        .header { background-color: #2f3542; color: #ffffff; padding: 10px; text-align: center; }
        .header h1 { margin: 0; font-size: 20px; }
        .nav { background-color: #dfe4ea; padding: 5px; text-align: center; font-size: 14px; }
        .nav a { margin: 0 5px; text-decoration: none; color: #2f3542; font-weight: bold; }
        
        .search-box { text-align: center; padding: 10px; background: #ffffff; margin-bottom: 5px; }
        .search-box input { width: 60%; padding: 5px; border: 1px solid #ccc; }
        .search-box button { padding: 5px 10px; background: #3742fa; color: white; border: none; cursor: pointer; }
        
        .product-card { background-color: #ffffff; margin: 5px; padding: 10px; border: 1px solid #ced6e0; text-align: center; }
        .product-card img { max-width: 100px; height: auto; border: 1px solid #ccc; }
        .product-title { font-size: 16px; margin: 5px 0; font-weight: bold; }
        .product-price { color: #ff4757; font-size: 15px; font-weight: bold; margin-bottom: 10px; }
        
        .btn { display: inline-block; padding: 6px 12px; background-color: #2ed573; color: white; text-decoration: none; font-size: 14px; border-radius: 3px; }
        .btn-view { background-color: #ffa502; }
        
        .footer { background-color: #2f3542; color: white; text-align: center; padding: 15px; margin-top: 10px; font-size: 12px; }
        .footer a { color: #7bed9f; text-decoration: none; margin: 0 5px; font-weight: bold; }
    </style>
</head>
<body>

    <!-- Header Section -->
    <div class="header">
        <h1>LFM Shop</h1>
    </div>

    <!-- Navigation -->
    <div class="nav">
        <a href="/">Home</a> | 
        <a href="/login">Login</a> | 
        <a href="/signup">Sign Up</a> | 
        <a href="/cart">Cart (0)</a>
    </div>

    <!-- Search Section -->
    <div class="search-box">
        <form action="/search" method="GET">
            <input type="text" name="q" placeholder="Product ID or Name...">
            <button type="submit">Search</button>
        </form>
    </div>

    <!-- Product List (Demo) -->
    <div class="product-card">
        <img src="https://via.placeholder.com/100" alt="Product Image">
        <div class="product-title">Red T-Shirt (Size: M)</div>
        <div class="product-price">৳ 350</div>
        <a href="/product/prod_123" class="btn btn-view">View</a>
        <a href="/cart/add/prod_123" class="btn">Add to Cart</a>
    </div>

    <div class="product-card">
        <img src="https://via.placeholder.com/100" alt="Product Image">
        <div class="product-title">Smart Watch Pro</div>
        <div class="product-price">৳ 1200</div>
        <a href="/product/prod_456" class="btn btn-view">View</a>
        <a href="/cart/add/prod_456" class="btn">Add to Cart</a>
    </div>

    <!-- Footer & Contacts -->
    <div class="footer">
        <p>Contact Us:</p>
        <!-- Controller from backend will dynamically update these links later -->
        <a href="https://wa.me/8801829627718" target="_blank">WhatsApp</a> | 
        <a href="https://www.facebook.com/profile.php?id=61577340780308" target="_blank">Messenger/Page</a> |
        <a href="mailto:support@lfmshop.com">Email</a> <br><br>
        <p>&copy; 2026 LFM Shop. All rights reserved.</p>
    </div>

</body>
</html>
