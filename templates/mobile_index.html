<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>LFM - Basic Mobile Version</title>
</head>
<body style="background: #000; color: #fff; font-family: monospace; padding: 10px;">
    <h2>LFM SHOP (Lite)</h2>
    <hr>
    <form action="/search" method="GET">
        <input type="text" name="q" placeholder="Search ID / Name..." value="{{ search_query|default('') }}">
        <input type="submit" value="Search">
    </form>
    <hr>
    <h3>Products:</h3>
    <ul>
        {% for p in products %}
        <li>
            <b>{{ p.product.name }}</b><br>
            ID: {{ p.id }}<br>
            Color: {{ p.color }}, Size: {{ p.size }}<br>
            Price: {{ p.price }} TK<br>
            <a href="https://wa.me/{{ settings.get('whatsapp_number', '01829627718') }}?text=Order%20ID:%20{{ p.id }}" style="color: yellow;">Order via WhatsApp</a>
        </li>
        <hr>
        {% else %}
        <li>No products found.</li>
        {% endfor %}
    </ul>
    <hr>
    <p>Contact: WhatsApp: 01829627718</p>
</body>
</html>
