{% extends "base.html" %}
{% block content %}
<h2 class="text-warning">⚙️ Admin Dashboard</h2>

<div class="card p-4 mb-4">
    <h4>নতুন পণ্য যোগ করুন</h4>
    <form method="POST">
        <input type="hidden" name="action" value="add_product">
        <div class="row">
            <div class="col-md-6 mb-2"><input type="text" name="name" class="form-control" placeholder="পণ্যের নাম" required></div>
            <div class="col-md-6 mb-2"><input type="text" name="size" class="form-control" placeholder="সাইজ (M, L, XL)"></div>
            <div class="col-md-4 mb-2"><input type="number" name="price" class="form-control" placeholder="দাম (৳)" required></div>
            <div class="col-md-4 mb-2"><input type="number" name="stock" class="form-control" placeholder="স্টক (কয়টি আছে?)" required></div>
            <div class="col-md-4 mb-2"><input type="text" name="image" class="form-control" placeholder="ছবির ডাইরেক্ট লিঙ্ক" required></div>
            <div class="col-md-12 mb-2"><input type="text" name="video" class="form-control" placeholder="ভিডিও লিঙ্ক (YouTube embed/mp4)"></div>
            <div class="col-md-12 mb-2"><textarea name="description" class="form-control" placeholder="বিস্তারিত বর্ণনা"></textarea></div>
        </div>
        <button type="submit" class="btn btn-custom">আপলোড করুন</button>
    </form>
</div>

<h4>অর্ডার ম্যানেজমেন্ট</h4>
<table class="table table-dark table-striped border-success">
    <tr>
        <th>ID</th><th>কাস্টমার</th><th>ফোন</th><th>পণ্য</th><th>ঠিকানা</th><th>স্ট্যাটাস</th><th>অ্যাকশন</th>
    </tr>
    {% for o in orders %}
    <tr>
        <td>#{{ o[0] }}</td><td>{{ o[1] }}</td><td>{{ o[2] }}</td><td>{{ o[3] }}</td><td>{{ o[4] }}</td><td>{{ o[5] }}</td>
        <td>
            <a href="/admin/update_order/{{ o[0] }}/Approved" class="btn btn-sm btn-success">Approve (WA)</a>
            <a href="/admin/update_order/{{ o[0] }}/Delivered" class="btn btn-sm btn-primary">Delivered (WA)</a>
            <a href="/admin/update_order/{{ o[0] }}/Rejected" class="btn btn-sm btn-danger">Reject (WA)</a>
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
