<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>LFM - Loop For Money</title>
    <style>
        body { background-color: #0d1117; color: #00ff66; font-family: monospace; padding: 20px; }
        .grid { display: flex; gap: 20px; flex-wrap: wrap; }
        .card { border: 1px solid #00ff66; padding: 15px; border-radius: 8px; width: 220px; text-align: center; }
        .btn { background: #00ff66; color: #000; padding: 8px 15px; text-decoration: none; font-weight: bold; border-radius: 5px; display: inline-block; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>⚡ WELCOME TO LFM SHOP ⚡</h1>
    <hr style="border-color:#00ff66;">
    
    <h2>পণ্যের তালিকা:</h2>
    <div class="grid">
        {% for product in products %}
        <div class="card">
            <h3>{{ product.name }}</h3>
            <p>মূল্য: ৳{{ product.price }}</p>
            <a href="/order/{{ product.id }}?ref={{ ref }}" class="btn">এখনই অর্ডার করুন</a>
        </div>
        {% endfor %}
    </div>
</body>
</html>
