{% extends "base.html" %}
{% block content %}
<h2 class="mb-4">🔥 এক্সক্লুসিভ কালেকশন (স্টক সীমিত)</h2>
<div class="row">
    {% for p in products %}
    <div class="col-md-3 mb-4">
        <div class="card h-100">
            <img src="{{ p[6] }}" class="card-img-top" alt="Product Image" style="height: 200px; object-fit: cover;">
            <div class="card-body text-center">
                <h5 class="card-title">{{ p[1] }}</h5>
                <p class="card-text text-warning">৳{{ p[4] }}</p>
                <p class="card-text"><small>স্টক আছে: {{ p[5] }} টি</small></p>
                <a href="/product/{{ p[0] }}" class="btn btn-custom w-100 mb-2">বিস্তারিত ও ভিডিও দেখুন</a>
                <a href="/add_to_cart/{{ p[0] }}" class="btn btn-outline-success w-100">Add to Cart 🛒</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
