{% extends "base.html" %}
{% block content %}
<h2>আপনার কার্ট 🛒</h2>
<div class="card-custom p-4 mt-3">
    {% for item in items %}
    <div class="d-flex justify-content-between align-items-center border-bottom border-secondary py-2">
        <span>{{ item[1] }}</span>
        <span style="color:var(--gold);">৳{{ item[4] }}</span>
    </div>
    {% else %}
    <p class="text-muted">আপনার কার্ট খালি!</p>
    {% endfor %}

    {% if items %}
    <h3 class="text-end text-warning mt-3">মোট: ৳{{ total }}</h3>
    <hr style="border-color:var(--border-color);">
    <form method="POST">
        <label class="form-label">আপনার ডেলিভারি ঠিকানা ও মোবাইল নম্বর দিন:</label>
        <textarea name="address" class="form-control bg-transparent text-white border-secondary mb-3" required></textarea>
        <button type="submit" class="btn btn-gold w-100">অর্ডার কনফার্ম করুন (Cash on Delivery)</button>
    </form>
    {% endif %}
</div>
{% endblock %}
