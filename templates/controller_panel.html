<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Controller Master Panel</title>
    <style>
        /* Cyberpunk-ish dark theme for the Controller */
        body { font-family: monospace; background: #000; color: #0f0; margin: 0; padding: 20px; }
        .panel { border: 1px solid #0f0; padding: 20px; margin-bottom: 20px; box-shadow: 0 0 10px #0f0; }
        h2 { border-bottom: 1px dashed #0f0; padding-bottom: 10px; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; color: white; }
        th, td { border: 1px solid #0f0; padding: 10px; text-align: center; }
        th { background: #0a0a0a; color: #0f0; }
        
        .btn-block { background: red; color: white; padding: 5px 10px; border: none; cursor: pointer; }
        .btn-approve { background: #0f0; color: black; padding: 5px 10px; border: none; cursor: pointer; font-weight: bold; }
        
        .settings-input { background: #111; color: #0f0; border: 1px solid #0f0; padding: 8px; width: 60%; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="panel">
        <h2>🛡️ SYSTEM CONTROLLER // ACCESS GRANTED</h2>
        
        <h3>User & Admin Management</h3>
        <table>
            <tr>
                <th>System ID</th>
                <th>Username</th>
                <th>Role</th>
                <th>Mobile</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
            <tr>
                <td>usr_k9X2mP8q</td>
                <td>srs_admin</td>
                <td>Admin (Pending)</td>
                <td>01829627718</td>
                <td>Needs Approval</td>
                <td>
                    <button class="btn-approve">Approve Admin</button>
                    <button class="btn-block">Block</button>
                </td>
            </tr>
        </table>
    </div>

    <div class="panel">
        <h2>🌐 UPDATE CONTACT LINKS (System Wide)</h2>
        <form action="/controller/update_links" method="POST">
            <label>WhatsApp Number:</label><br>
            <input type="text" name="whatsapp" value="01829627718" class="settings-input"><br>
            
            <label>Facebook Page Link:</label><br>
            <input type="text" name="facebook" value="https://www.facebook.com/profile.php?id=61577340780308" class="settings-input"><br>
            
            <label>YouTube Link:</label><br>
            <input type="text" name="youtube" placeholder="Enter YouTube Link" class="settings-input"><br>
            
            <button type="submit" class="btn-approve" style="padding: 10px; margin-top: 10px;">SAVE CONFIG</button>
        </form>
    </div>

</body>
</html>
