<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .card { background-color: #1e293b; border: 1px solid #334155; }
        .form-control, .form-select { background-color: #0f172a; border: 1px solid #334155; color: #fff; }
    </style>
</head>
<body class="p-3">

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>অ্যাডমিন কন্ট্রোল প্যানেল</h3>
        <a href="/logout" class="btn btn-outline-danger btn-sm">লগআউট</a>
    </div>

    <!-- Product Upload Form -->
    <div class="card p-3 mb-4">
        <h5 class="text-success mb-3">নতুন প্রোডাক্ট আপলোড করুন</h5>
        <form action="/admin/product/add" method="POST">
            <div class="row g-2">
                <div class="col-md-4"><input type="text" name="name" class="form-control" placeholder="প্রোডাক্টের নাম" required></div>
                <div class="col-md-4"><input type="text" name="category_type" class="form-control" placeholder="ক্যাটাগরি" required></div>
                <div class="col-md-2"><input type="text" name="color" class="form-control" placeholder="কালার (Red/Blue)" required></div>
                <div class="col-md-2"><input type="text" name="size" class="form-control" placeholder="সাইজ (S/M/L/XL)" required></div>
                <div class="col-md-3"><input type="number" name="price" class="form-control" placeholder="দাম (Price)" required></div>
                <div class="col-md-3"><input type="number" name="stock" class="form-control" placeholder="স্টক পরিমাণ" required></div>
                <div class="col-md-6"><input type="text" name="pic_urls" class="form-control" placeholder="ছবি URL (Comma Separated)" required></div>
            </div>
            <button type="submit" class="btn btn-success mt-3">আপলোড করুন (Auto Generate Unique ID)</button>
        </form>
    </div>

    <!-- Order Processing Table -->
    <div class="card p-3">
        <h5 class="text-warning mb-3">গ্রাহকদের অর্ডারের তালিকা</h5>
        <div class="table-responsive">
            <table class="table table-dark table-striped align-middle">
                <thead>
                    <tr>
                        <th>Order ID</th><th>Variant ID</th><th>পরিমাণ</th><th>মোট দাম</th><th>স্ট্যাটাস</th><th>অ্যাকশন</th>
                    </tr>
                </thead>
                <tbody>
                    {% for o in orders %}
                    <tr>
                        <td><code>{{ o.id }}</code></td>
                        <td><code>{{ o.variant_id }}</code></td>
                        <td>{{ o.quantity }}</td>
                        <td>{{ o.total_price }} ৳</td>
                        <td><span class="badge bg-info">{{ o.status }}</span></td>
                        <td>
                            <form action="/admin/order/update/{{ o.id }}" method="POST" class="d-flex gap-1">
                                <select name="status" class="form-select form-select-sm">
                                    <option value="pending">Pending</option>
                                    <option value="on_road">On the way (রাস্তায় আছে)</option>
                                    <option value="delivered">Delivered</option>
                                </select>
                                <button type="submit" class="btn btn-sm btn-primary">Update</button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
