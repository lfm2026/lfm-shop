<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - LFM Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .card { background-color: #1e293b; border: 1px solid #334155; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3 mb-4">
    <span class="navbar-brand mb-0 h1 text-primary">LFM Admin Dashboard</span>
    <div>
        <span class="text-light me-3">Welcome, <strong>{{ user.username }}</strong></span>
        <a href="{{ url_for('logout') }}" class="btn btn-sm btn-outline-danger">Logout</a>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-md-12 mb-4">
            <div class="card p-4">
                <h4 class="text-success mb-3">অ্যাডমিন প্যানেল সক্রিয় আছে</h4>
                <p>এখানে আপনি প্রোডাক্ট ম্যানেজমেন্ট এবং অর্ডার প্রসেসিং ফিচার দেখতে পাবেন।</p>
                <a href="{{ url_for('home') }}" class="btn btn-outline-light btn-sm w-25">হোম পেজে যান</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
