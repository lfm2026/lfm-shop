<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - LFM Shop</title>
    <style>
        body { font-family: sans-serif; background: #dfe4ea; margin: 0; padding: 20px; }
        .panel { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { border-bottom: 2px solid #2ed573; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], input[type="number"], select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn { background: #2ed573; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: #2f3542; color: white; }
        
        .btn-whatsapp { background: #25D366; color: white; padding: 5px 10px; text-decoration: none; border-radius: 3px; font-size: 12px; }
        .btn-email { background: #ff4757; color: white; padding: 5px 10px; text-decoration: none; border-radius: 3px; font-size: 12px; }
    </style>
</head>
<body>

    <div class="panel">
        <h2>📦 Product Upload (Auto Generate Unique ID)</h2>
        <form action="/admin/upload" method="POST">
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" name="name" required placeholder="e.g. Red T-Shirt">
            </div>
            <div class="form-group">
                <label>Product Type</label>
                <input type="text" name="type" required placeholder="Type or select existing..." list="types">
                <datalist id="types">
                    <option value="T-Shirt">
                    <option value="Watch">
                </datalist>
            </div>
            <div class="form-group">
                <label>Available Colors (Comma separated)</label>
                <input type="text" name="colors" placeholder="Red, Black, Blue" required>
            </div>
            <div class="form-group">
                <label>Available Sizes (Comma separated)</label>
                <input type="text" name="sizes" placeholder="S, M, L, XL" required>
            </div>
            <div class="form-group">
                <label>Price & Stock</label>
                <input type="number" name="price" placeholder="Price (৳)" required style="width: 48%;">
                <input type="number" name="stock" placeholder="Stock Quantity" required style="width: 48%;">
            </div>
            <div class="form-group">
                <label>Image URLs (Comma separated)</label>
                <input type="text" name="pic_urls" required placeholder="https://img1.jpg, https://img2.jpg">
            </div>
            <button type="submit" class="btn">Upload Product & Generate IDs</button>
        </form>
    </div>

    <div class="panel">
        <h2>🚚 Order Management</h2>
        <table>
            <tr>
                <th>Order ID</th>
                <th>Product ID</th>
                <th>Customer</th>
                <th>Status</th>
                <th>Actions (Message)</th>
            </tr>
            <!-- Loop through orders -->
            <tr>
                <td>ord_1a2b3c</td>
                <td>var_X9Y8kL</td>
                <td>01712345678</td>
                <td style="color: orange;"><b>Pending</b></td>
                <td>
                    <form action="/admin/approve/ord_1a2b3c" method="POST" style="display:inline;">
                        <button class="btn" style="padding: 5px; font-size: 12px;">Approve & Send Mail</button>
                    </form>
                    <a href="https://wa.me/8801712345678?text=Your%20order%20ord_1a2b3c%20is%20confirmed!" class="btn-whatsapp" target="_blank">WhatsApp Msg</a>
                </td>
            </tr>
        </table>
    </div>

</body>
</html>
