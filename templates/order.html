<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>অর্ডার ফর্ম - {{ product.name }}</title>
    <style>
        body { background-color: #0d1117; color: #fff; font-family: sans-serif; padding: 20px; }
        form { background: #161b22; padding: 20px; border-radius: 8px; width: 300px; border: 1px solid #00ff66; }
        input { width: 90%; padding: 8px; margin: 10px 0; }
        .btn { background: #00ff66; color: #000; padding: 10px; width: 100%; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h2>অর্ডার কনফার্ম করুন</h2>
    <form method="POST">
        <h3>পণ্য: {{ product.name }}</h3>
        <p>মূল্য: ৳{{ product.price }}</p>
        
        <input type="text" name="name" placeholder="আপনার নাম" required>
        <input type="text" name="phone" placeholder="মোবাইল / হোয়াটসঅ্যাপ নম্বর" required>
        <input type="email" name="email" placeholder="ইমেইল অ্যাড্রেস" required>
        <input type="text" name="address" placeholder="ফুল ঠিকানা" required>
        
        <button type="submit" class="btn">অর্ডার সাবমিট করুন</button>
    </form>
</body>
  </html>
