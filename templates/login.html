{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center my-5">
    <div class="col-12 col-md-5">
        <div class="card-custom p-4 shadow-lg">
            <h2 class="text-center fw-bold mb-4" style="color:var(--gold);">লগইন করুন</h2>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">মোবাইল নম্বর</label>
                    <input type="text" name="phone" class="form-control bg-transparent text-white border-secondary" placeholder="017xxxxxxxx" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">পাসওয়ার্ড</label>
                    <input type="password" name="password" class="form-control bg-transparent text-white border-secondary" placeholder="******" required>
                </div>
                <button type="submit" class="btn btn-gold w-100 py-2 fs-5">লগইন</button>
            </form>
            <hr class="my-4" style="border-color:var(--border-color);">
            <p class="text-center mb-0">অ্যাকাউন্ট নেই? <a href="/signup" class="text-warning font-weight-bold">নতুন অ্যাকাউন্ট খুলুন</a></p>
        </div>
    </div>
</div>
{% endblock %}
