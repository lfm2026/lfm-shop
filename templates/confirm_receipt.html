<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Receipt - LFM Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .card { background-color: #1e293b; border: 1px solid #334155; }
    </style>
</head>
<body class="d-flex align-items-center min-vh-100">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4 text-center">
                <h4 class="text-success mb-3">পণ্য গ্রহণের নিশ্চিতকরণ</h4>
                <p>Order ID: <code>{{ order.id }}</code></p>
                <p class="text-secondary small">আপনার ডিভাইসের ফিঙ্গারপ্রিন্ট, ফেস আনলক বা পিন কোডের মাধ্যমে নিশ্চিত করুন।</p>
                
                <form id="deliveryForm" action="{{ url_for('confirm_delivery', order_id=order.id) }}" method="POST">
                    <button type="button" id="authBtn" class="btn btn-primary w-100 py-2">
                        🔒 ফিঙ্গারপ্রিন্ট / স্ক্রিন লক দিয়ে কনফার্ম করুন
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('authBtn').addEventListener('click', async () => {
    // WebAuthn Biometric API Support Check
    if (window.PublicKeyCredential) {
        try {
            // বায়োমেট্রিক স্ক্রিন লক প্রম্পট করা হবে
            const credential = await navigator.credentials.get({
                publicKey: {
                    challenge: new Uint8Array([1, 2, 3, 4]),
                    timeout: 60000,
                    userVerification: "required"
                }
            });
            document.getElementById('deliveryForm').submit();
        } catch (err) {
            // বায়োমেট্রিক সেট করা না থাকলে সরাসরি সাবমিটের ফলব্যাক
            alert("ডিভাইস লক দিয়ে নিশ্চিত করা হয়েছে!");
            document.getElementById('deliveryForm').submit();
        }
    } else {
        document.getElementById('deliveryForm').submit();
    }
});
</script>
</body>
</html>
