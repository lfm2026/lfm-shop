<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LFM - Loop For Money</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --gold: #D4AF37; --silver: #C0C0C0; --dark: #0A0A0F; --dark-blue: #0F1419; --glass: rgba(255, 255, 255, 0.05); }
        body { font-family: 'Hind Siliguri', sans-serif; background: var(--dark); color: #fff; overflow-x: hidden; }
        header { position: fixed; top: 0; width: 100%; padding: 15px 5%; background: rgba(10, 10, 15, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(212, 175, 55, 0.2); display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .logo h1 { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; background: linear-gradient(135deg, var(--gold), var(--silver)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        .search-bar { display: flex; gap: 10px; max-width: 500px; width: 100%; padding: 0 20px; }
        .search-bar input { width: 100%; padding: 8px 15px; border-radius: 5px; border: 1px solid var(--gold); background: var(--glass); color: #fff; }
        .search-bar button { padding: 8px 15px; background: var(--gold); border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        .container { max-width: 1200px; margin: 100px auto 40px; padding: 0 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .product-card { background: var(--glass); border: 1px solid rgba(212,175,55,0.2); border-radius: 10px; padding: 15px; text-align: center; }
        .product-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; cursor: pointer; }
        .product-card h3 { margin: 10px 0; font-size: 1.2rem; }
        .btn { padding: 8px 20px; background: var(--gold); color: #000; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 10px; }
        
        /* Floating Contact FAB */
        .contact-fab { position: fixed; bottom: 30px; right: 30px; z-index: 1001; }
        .fab-main { width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, var(--gold), #B8860B); display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 5px 20px rgba(212, 175, 55, 0.5); }
        .fab-main i { font-size: 1.5rem; color: #000; }
        .fab-menu { position: absolute; bottom: 70px; right: 0; display: flex; flex-direction: column; gap: 10px; opacity: 0; pointer-events: none; transition: 0.3s; }
        .fab-menu.active { opacity: 1; pointer-events: all; }
        .fab-item { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 1.3rem; text-decoration: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .whatsapp { background: #25D366; } .messenger { background: #0084FF; } .email { background: #EA4335; }
    </style>
</head>
<body>

    <header>
        <div class="logo"><h1>LFM</h1></div>
        <form action="/search" method="GET" class="search-bar">
            <input type="text" name="q" placeholder="পণ্য বা ইউনিক আইডি (যেমন var_...) দিয়ে খুঁজুন..." value="{{ search_query|default('') }}">
            <button type="submit">খুঁজুন</button>
        </form>
        <div class="auth-btns"><a href="#" class="btn">লগইন</a></div>
    </header>

    <div class="container">
        <h2>উপলব্ধ পণ্যসমূহ</h2>
        <div class="product-grid">
            {% for p in products %}
            <div class="product-card">
                <img src="{{ p.pic_urls.split(',')[0] }}" alt="{{ p.product.name }}" onclick="window.open(this.src)">
                <h3>{{ p.product.name }}</h3>
                <p>আইডি: {{ p.id }}</p>
                <p>রং: {{ p.color }} | সাইজ: {{ p.size }}</p>
                <p>মূল্য: ৳{{ p.price }}</p>
                <p>স্টক: {{ p.stock }} টি</p>
                <button class="btn" onclick="alert('অর্ডার করতে লগইন করুন এবং আইডি ব্যবহার করুন!')">অর্ডার করুন</button>
            </div>
            {% else %}
            <p>কোনো পণ্য পাওয়া যায়নি।</p>
            {% endfor %}
        </div>
    </div>

    <!-- Floating Contact Menu -->
    <div class="contact-fab">
        <div class="fab-menu" id="fabMenu">
            <a href="https://wa.me/{{ settings.get('whatsapp_number', '01829627718') }}" class="fab-item whatsapp"><i class="fab fa-whatsapp"></i></a>
            <a href="{{ settings.get('messenger_link', 'https://m.me/61577340780308') }}" class="fab-item messenger"><i class="fab fa-facebook-messenger"></i></a>
            <a href="mailto:{{ settings.get('support_email', 'support@lfmshop.com') }}" class="fab-item email"><i class="fas fa-envelope"></i></a>
        </div>
        <div class="fab-main" id="fabMain"><i class="fas fa-headset"></i></div>
    </div>

    <script>
        const fabMain = document.getElementById('fabMain');
        const fabMenu = document.getElementById('fabMenu');
        fabMain.addEventListener('click', () => { fabMenu.classList.toggle('active'); });
    </script>
</body>
</html>
