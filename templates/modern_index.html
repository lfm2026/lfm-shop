<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LFM Shop - Modern View</title>
    <style>
        /* Modern CSS for Android/PC */
        :root { --primary: #2ed573; --dark: #2f3542; --light: #f1f2f6; --accent: #ff4757; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: var(--light); color: var(--dark); }
        
        .navbar { display: flex; justify-content: space-between; align-items: center; background: var(--dark); color: white; padding: 15px 20px; position: sticky; top: 0; z-index: 100; }
        .navbar h2 { margin: 0; color: var(--primary); }
        .nav-links a { color: white; text-decoration: none; margin-left: 15px; font-weight: bold; }
        
        .search-bar { padding: 20px; text-align: center; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .search-bar input { width: 70%; padding: 12px; border: 1px solid #ccc; border-radius: 5px 0 0 5px; outline: none; }
        .search-bar button { padding: 12px 20px; background: var(--primary); color: white; border: none; border-radius: 0 5px 5px 0; cursor: pointer; font-weight: bold; }
        
        .product-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        .product-card { background: white; border-radius: 8px; padding: 15px; text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.1); transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 8px 16px rgba(0,0,0,0.2); }
        .product-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; cursor: pointer; }
        
        .product-id { font-size: 11px; color: #888; margin-top: 5px; }
        .price { font-size: 20px; color: var(--accent); font-weight: bold; margin: 10px 0; }
        
        .action-btns { display: flex; justify-content: space-between; }
        .btn { flex: 1; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 0 5px; text-decoration: none; }
        .btn-cart { background: var(--primary); color: white; }
        .btn-view { background: #ffa502; color: white; }
    </style>
</head>
<body>

    <nav class="navbar">
        <h2>LFM Shop</h2>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/login">Login</a>
            <a href="/cart">Cart 🛒</a>
        </div>
    </nav>

    <div class="search-bar">
        <form action="/search" method="GET">
            <input type="text" name="q" placeholder="Search by exact Product ID or Name..." required>
            <button type="submit">Search</button>
        </form>
    </div>

    <div class="product-container">
        <!-- Backend Theke data asbe -->
        <div class="product-card">
            <img src="https://via.placeholder.com/300" alt="Product" onclick="window.location.href='/product/var_X9Y8'">
            <h3>Premium Black Hoodie</h3>
            <div class="product-id">ID: var_X9Y8kL2m1pQ5zT7v</div>
            <p>Size: L | Color: Black</p>
            <div class="price">৳ 850</div>
            <div class="action-btns">
                <a href="/product/var_X9Y8" class="btn btn-view">View</a>
                <a href="/cart/add/var_X9Y8" class="btn btn-cart">Add to Cart</a>
            </div>
        </div>
    </div>

</body>
  </html>
